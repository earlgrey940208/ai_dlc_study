services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: tableorder
      POSTGRES_USER: tableorder
      POSTGRES_PASSWORD: tableorder
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tableorder"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/tableorder
      SPRING_DATASOURCE_USERNAME: tableorder
      SPRING_DATASOURCE_PASSWORD: tableorder
      JWT_SECRET: table-order-jwt-secret-key-change-in-production-2024
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
